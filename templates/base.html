{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-100">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Enis | Portfolio{% endblock title %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="{% static 'core/css/cover.css' %}" rel="stylesheet">
</head>

<body class="d-flex flex-column h-100">

    <!-- HEADER: cover-container dışında, tam genişlik -->
    <header class="w-100 px-4 py-3">
        <div class="d-flex align-items-center justify-content-between">

            <div style="min-width: 200px;">
                <h3 class="mb-0">Enis Buğra Bulut</h3>
            </div>

            <nav class="nav nav-masthead justify-content-center gap-4">
                <a href="{% url 'core:home' %}" class="nav-link fw-bold {% if request.resolver_match.url_name == 'home' %}active{% endif %}">Home</a>
                <a href="{% url 'core:about' %}" class="nav-link fw-bold {% if request.resolver_match.url_name == 'about' %}active{% endif %}">About</a>
                <a href="{% url 'core:projects' %}" class="nav-link fw-bold {% if request.resolver_match.url_name == 'projects' %}active{% endif %}">Projects</a>
                <a href="{% url 'core:contact' %}" class="nav-link fw-bold {% if request.resolver_match.url_name == 'contact' %}active{% endif %}">Contact</a>
            </nav>

            <div class="d-flex gap-2" style="min-width: 200px; justify-content: flex-end;">
                <div class="btn-group btn-group-sm">
                    <button class="btn btn-outline-secondary" id="dark-mode-btn"><i class="bi bi-moon-fill"></i></button>
                    <button class="btn btn-outline-secondary" id="light-mode-btn"><i class="bi bi-sun-fill"></i></button>
                </div>
                <div class="btn-group btn-group-sm">
                    <button class="btn btn-outline-secondary" id="lang-tr-btn">TR</button>
                    <button class="btn btn-outline-secondary" id="lang-en-btn">EN</button>
                </div>
            </div>

        </div>
    </header>

    <!-- MAIN: cover-container ile ortalanmış -->
    <main class="cover-container d-flex flex-column flex-grow-1 px-3 mx-auto text-center justify-content-center">
        {% block content %}
        {% endblock content %}
    </main>

    <footer class="w-100 text-center py-3">
        <p class="mb-0">Portfolio by Enis.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'core/js/main.js' %}"></script>
</body>
</html>
