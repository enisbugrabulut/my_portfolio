{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}" class="h-100">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Enis | Portfolio{% endblock title %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="{% static 'core/css/cover.css' %}" rel="stylesheet">
</head>

<body class="d-flex flex-column h-100">

    <header class="w-100 px-4 py-3 {% block header_class %}{% endblock header_class %}">
        <div class="d-flex align-items-center justify-content-between">

            <div style="min-width: 200px;">
                <h3 class="mb-0">Enis Buğra Bulut</h3>
            </div>

            <nav class="nav nav-masthead justify-content-center gap-4">
                <a href="{% url 'core:home' %}" class="nav-link fw-bold {% if request.resolver_match.url_name == 'home' %}active{% endif %}">{% trans "Home" %}</a>
                <a href="{% url 'core:about' %}" class="nav-link fw-bold {% if request.resolver_match.url_name == 'about' %}active{% endif %}">{% trans "About" %}</a>
                <a href="{% url 'core:projects' %}" class="nav-link fw-bold {% if request.resolver_match.url_name == 'projects' %}active{% endif %}">{% trans "Projects" %}</a>
                <a href="{% url 'core:contact' %}" class="nav-link fw-bold {% if request.resolver_match.url_name == 'contact' %}active{% endif %}">{% trans "Contact" %}</a>
            </nav>

            <div class="d-flex gap-2" style="min-width: 200px; justify-content: flex-end;">
                <div class="btn-group btn-group-sm">
                    <button class="btn btn-outline-secondary" id="dark-mode-btn"><i class="bi bi-moon-fill"></i></button>
                    <button class="btn btn-outline-secondary" id="light-mode-btn"><i class="bi bi-sun-fill"></i></button>
                </div>
                <form action="{% url 'set_language' %}" method="post" class="d-flex">
                    {% csrf_token %}
                    <input name="next" type="hidden" value="{{ request.get_full_path }}">
    
                    <div class="btn-group btn-group-sm" role="group">
                        <button type="submit" name="language" value="en" class="btn btn-outline-secondary {% if LANGUAGE_CODE == 'en' %}active{% endif %}">EN</button>
                        <button type="submit" name="language" value="tr" class="btn btn-outline-secondary {% if LANGUAGE_CODE == 'tr' %}active{% endif %}">TR</button>
                    </div>
                </form>
            </div>

        </div>
    </header>

    <main class="cover-container d-flex flex-column flex-grow-1 px-3 mx-auto text-center justify-content-center">
        {% block content %}
        {% endblock content %}
    </main>

    <footer class="w-100 text-center py-3 fade-in">
        <p class="mb-0">{% trans "Portfolio by Enis." %}</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'core/js/main.js' %}"></script>
</body>
</html>
